<!DOCTYPE html>
<html>

<head>
    <script type="text/javascript" src="calculator.js" language="javascript"></script>
    <link rel="stylesheet" type="text/css" href="calculator.css">
    <title>Syndiate's Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
</head>

<body>
    <div id="math-value-listener" value=""></div>
    <ul id="basic-menu">
        <h1>Basic</h1>
        <input type="radio" id="basic" name="basic_option" value="basic">
        <label for="basic">Standard Equation</label><br>
        <input type="radio" id="truefalse" name="basic_option" value="truefalse">
        <label for="truefalse">True or False</label><br>
        <input type="radio" id="round" name="basic_option" value="round">
        <label for="round">Round</label><br>
        <input type="radio" id="evenodd" name="basic_option" value="evenodd">
        <label for="evenodd">Even or Odd</label><br>
        <input type="radio" id="abs" name="basic_option" value="abs">
        <label for="abs">Absolute value</label><br>
        <input type="radio" id="roman" name="basic_option" value="roman">
        <label for="roman">Roman Numerals</label><br>
        <input type="radio" id="factors" name="basic_option" value="factors">
        <label for="factors">Factors</label><br>
        <input type="radio" id="fractions" name="basic_option" value="fractions">
        <label for="fractions">Fractions</label><br>
        <input type="radio" id="basicfraction" name="basic_option" value="basicfraction">
        <label for="basicfraction">Standard fraction equations</label><br>
        <input type="radio" id="decimalpercent" name="basic_option" value="decimalpercent">
        <label for="decimalpercent">Decimals and percents</label><br>
        <input type="radio" id="meanmad" name="basic_option" value="meanmad">
        <label for="meanmad">Mean, median, mode, and MAD (Mean average deviation)</label><br>
        <input type="radio" id="sqrt" name="basic_option" value="sqrt">
        <label for="sqrt">Nth root</label><br>
        <input type="radio" id="exponent" name="basic_option" value="exponent">
        <label for="exponent">Power to</label><br>
    </ul>

    <div id="mathinput" style="display: none !important;">
    </div>

</body>

</html>
